type Mutation {
  signup(input: SignupInput!): Boolean!
  login(input: LoginInput!): LoginPayload!
}

type Query {
  me: User
}

input SignupInput {
  email: String!
  password: String!
}

input LoginInput {
  email: String!
  password: String!
}

type LoginPayload {
  token: String!
  user: User!
}

type User {
  id: ID!
  email: String!
}

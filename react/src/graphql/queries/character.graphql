query Character($id: ID!) {
  character(id: $id) {
    id
    name
    level
    experience
    background
    personality {
      traits
      ideals
      bonds
      flaws
    }
    abilities {
      id
      name
      score
      modifier
    }
    skills {
      id
      name
      modifier
      isProficient
      ability {
        id
        name
      }
    }
  }
}
